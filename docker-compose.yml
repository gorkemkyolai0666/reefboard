version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reefboard
      POSTGRES_PASSWORD: reefboard123
      POSTGRES_DB: reefboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "4034:4034"
    environment:
      DATABASE_URL: postgresql://reefboard:reefboard123@postgres:5432/reefboard?schema=public
      JWT_SECRET: reefboard-dev-secret
      FRONTEND_URL: http://localhost:3034
      PORT: 4034
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3034:3034"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4034/api
    depends_on:
      - backend

volumes:
  pgdata:
